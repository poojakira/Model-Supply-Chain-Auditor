# Model Supply Chain Auditor - Pickle Scanning Rules
# Curated denylist from public pickle/model-supply-chain research.
# This file is not an exhaustive gadget catalog.
# References:
# - https://arxiv.org/abs/2508.19774
# - https://www.sonatype.com/security-advisories/cve-2025-1716
# - https://research.jfrog.com/vulnerabilities/picklescan-cve-2025-10155/
# - https://research.jfrog.com/vulnerabilities/picklescan-cve-2025-10156/
# - https://research.jfrog.com/vulnerabilities/picklescan-cve-2025-10157/

schema_version: "2.0"

settings:
  max_reduce_depth: 5         # Total chain depth across entire pickle
  unknown_module_risk: "suspicious"
  scan_past_stop: true
  track_memo: true            # MEMOWNED detection requires this
  allowlist_only_mode: false  # Strict mode: flag anything not in safe_modules

# Safe modules — based on Fickling's allowlist + top-100 HuggingFace models.
# IMPORTANT: This list is INTENTIONALLY MINIMAL. Modules like 'operator',
# 'functools', '_codecs' are NOT here because their functions are abused
# in public bypass research (operator.methodcaller, _codecs.encode/decode, etc.)
safe_modules:
  - torch
  - torch.nn
  - torch.nn.modules
  - torch._utils
  - torch.storage
  - torch.cuda
  - torch.serialization
  - numpy
  - numpy.core
  - numpy.core.multiarray
  - numpy.core.numeric
  - numpy.dtype
  - numpy.ndarray
  - numpy.random
  - sklearn
  - sklearn.tree
  - sklearn.ensemble
  - sklearn.linear_model
  - sklearn.preprocessing
  - sklearn.pipeline
  - collections
  - collections.abc
  - copy
  - copyreg
  - _codecs  # Required for many string operations in pickles, but _codecs.encode/decode are in dangerous_callables

# Dangerous modules — broad bans for clearly malicious imports.
dangerous_modules:
  critical:
    - os
    - subprocess
    - nt          # Windows: os.system → nt.system
    - posix       # Linux: os.system → posix.system
    - builtins
    - _bootsubprocess
    - _frozen_importlib
    - _frozen_importlib_external
    - cProfile
    - profile
    - code
    - trace
    - pipes
    - imp
    - shutil
    - signal
    - socket
    - ctypes
    - multiprocessing
    - webbrowser
    - pty
    - commands
    - eval
    - exec
    - compile
  high:
    - sys
    - http
    - urllib
    - requests
    - ftplib
    - smtplib
    - importlib
    - runpy
    - threading
    - _thread
    - asyncio
    - antigravity
    - codeop
  medium:
    - tempfile
    - pathlib
    - glob
    - io
    - pickle
    - shelve
    - marshal
    - types
    - inspect

# Specific dangerous callables — even if module looks safe.
# Each entry has a published reference.
dangerous_callables:
  # === STANDARD RCE ===
  - os.system
  - os.popen
  - os.exec
  - os.execl
  - os.execle
  - os.execlp
  - os.execv
  - os.execve
  - os.execvp
  - os.execvpe
  - os.spawnl
  - os.spawnle
  - subprocess.call
  - subprocess.check_call
  - subprocess.check_output
  - subprocess.Popen
  - subprocess.run
  - builtins.eval
  - builtins.exec
  - builtins.compile
  - builtins.__import__
  - nt.system
  - posix.system

  # === typing.ForwardRef eval chain (SiggytheShark) ===
  - typing.ForwardRef
  - typing._eval_type

  # === Decompression (used to obfuscate payloads) ===
  - gzip.decompress
  - zlib.decompress
  - lzma.decompress
  - bz2.decompress

  # === Encoding (MEMOWNED uses codecs.decode for runtime name construction) ===
  - codecs.decode
  - codecs.encode
  - _codecs.encode
  - _codecs.decode

  # === CPython internals (bypass prefix bans) ===
  - _bootsubprocess.Popen
  - _frozen_importlib_external._write_atomic

  # === Operator module (deferred dispatch) ===
  - operator.methodcaller
  - operator.attrgetter

  # === Importlib ===
  - importlib.import_module
  - importlib.reload
  - importlib._bootstrap._call_with_frames_cleaned

  # === Pip (Sonatype CVE-2025-1716) ===
  - pip.main
  - pip._internal.cli.main.main

  # === Site/imp/pkg_resources ===
  - site.addpackage
  - site.main
  - imp.load_source
  - imp.load_dynamic
  - imp.load_module
  - pkg_resources.EntryPoint.resolve

  # === Pipes (Python ≤3.12) ===
  - pipes.Template
  - pipes.Template.copy
  - pipes.Template.open_r

  # === Mailcap ===
  - mailcap.findmatch

  # === Pydoc (PickleCloak) ===
  - pydoc.pipepager
  - pydoc.importfile
  - pydoc.locate
  - pydoc.safeimport
  - pydoc.tempfilepager

  # === cProfile/profile (PickleCloak) ===
  - cProfile.run
  - cProfile.runctx
  - profile.run
  - profile.runctx

  # === cgitb (PickleCloak) ===
  - cgitb.lookup

  # === Logging (PickleCloak) ===
  - logging.config._resolve
  - logging.config._install_handlers

  # === Asyncio (JFrog CVE-2025-10157) ===
  - asyncio.unix_events._UnixSubprocessTransport

  # === _osx_support (PickleCloak) ===
  - _osx_support._read_output

  # === xmlrpc helpers (getattr equivalents) ===
  - xmlrpc.server.resolve_dotted_attribute

  # === Code/trace/doctest ===
  - code.InteractiveInterpreter.runcode
  - trace.Trace.run
  - trace.Trace.runctx
  - doctest.debug_script

  # === Unittest ===
  - unittest.loader.TestLoader._get_module_from_name
  - unittest.mock._importer
  - unittest.mock._dot_lookup

  # === Misc (PickleCloak) ===
  - uuid._get_command_stdout
  - dataclasses._create_fn
  - distutils.spawn.spawn
  - lib2to3.pgen2.grammar.Grammar.loads

  # === NumPy gadgets (21+ from PickleCloak) ===
  - numpy.f2py.capi_maps.getinit
  - numpy.f2py.capi_maps.load_f2cmap_file
  - numpy.f2py.crackfortran._eval_scalar
  - numpy.f2py.crackfortran.myeval
  - numpy.f2py.diagnose.run_command
  - numpy.f2py.f2py2e.callcrackfortran
  - numpy.distutils.exec_command._exec_command
  - numpy.distutils.cpuinfo.command_by_line
  - numpy.distutils.cpuinfo.command_info
  - numpy.distutils.cpuinfo.getoutput
  - numpy.distutils.lib2def.getnm
  - numpy.distutils.misc_util.exec_mod_from_location
  - numpy.testing._private.utils.measure
  - numpy.testing._private.utils.runstring
  - numpy.lib.utils._makenamedict
  - numpy.lib.npyio.savetxt
  - numpy.lib.npyio.loadtxt
  - numpy.ma.mrecords.openfile
  - numpy.memmap

  # === SymPy gadgets (PickleCloak) ===
  - sympy.lazy_function
  - sympy.sympify
  - sympy.parsing.sympy_parser.eval_expr
  - sympy.utilities.lambdify.lambdify
  - sympy.utilities._compilation.compilation.compile_run_strings
  - sympy.utilities.source.get_class
  - sympy.external.importtools.import_module

  # === Pandas (PickleCloak) ===
  - pandas.read_pickle

  # === Network (PickleCloak) ===
  - urllib.request.urlretrieve
  - urllib.request.URLopener.retrieve
  - urllib.request.URLopener.open

  # === Misc file/exec (PickleCloak) ===
  - _pyio._open_code_with_warning
  - pkgutil.ImpLoader.get_data
  - fileinput.hook_compressed
  - shlex.shlex.sourcehook
  - mailbox.MH.get_bytes
  - mailbox.MH.get_file

  # === Helper getattr-equivalents ===
  - lib2to3.fixer_util.attr_chain
  - test.support.get_attribute
